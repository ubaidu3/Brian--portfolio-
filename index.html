<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brian | 3D Portfolio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  color: white;
  background: radial-gradient(circle at center, #050510, #000);
}

/* ===== Menu Button ===== */
#menuBtn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 28px;
  z-index: 50;
  cursor: pointer;
  user-select: none;
}

/* ===== Sidebar ===== */
#sidebar {
  position: fixed;
  top: 0;
  left: -280px;
  width: 260px;
  height: 100%;
  background: rgba(10,10,25,0.95);
  backdrop-filter: blur(12px);
  padding: 70px 20px;
  z-index: 40;
  transition: 0.3s;
}

#sidebar.open {
  left: 0;
}

.tree a {
  display: block;
  padding: 12px;
  margin: 10px 0;
  color: white;
  text-decoration: none;
  border-left: 2px solid transparent;
  cursor: pointer;
  transition: 0.3s;
}

.tree a:hover {
  color: cyan;
  border-left: 2px solid cyan;
  padding-left: 18px;
}

/* ===== Sections ===== */
.section {
  position: absolute;
  top: 45%;
  width: 100%;
  text-align: center;
  opacity: 0;
  transform: translateY(40px) scale(0.98);
  pointer-events: none;
}

/* Active controlled by GSAP */
.section.active {
  pointer-events: auto;
}

/* Title */
h1 {
  position: fixed;
  top: 15px;
  right: 15px;
  font-size: 18px;
  opacity: 0.6;
}

/* ===== Mobile Optimization ===== */
@media (max-width: 768px) {
  #sidebar {
    width: 220px;
  }

  .section {
    top: 40%;
    font-size: 14px;
  }

  h1 {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<div id="menuBtn">☰</div>
<h1>Brian</h1>

<!-- Sidebar -->
<div id="sidebar">
  <div class="tree">
    <a onclick="show('home')">🏠 Home</a>
    <a onclick="show('about')">👤 About</a>
    <a onclick="show('projects')">💻 Projects</a>
    <a onclick="show('contact')">📩 Contact</a>
  </div>
</div>

<!-- Sections -->
<div id="home" class="section active">
  <h2>Hi I'm Brian</h2>
  <p>3D Web Developer</p>
</div>

<div id="about" class="section">
  <h2>About Me</h2>
  <p>I build immersive web experiences.</p>
</div>

<div id="projects" class="section">
  <h2>Projects</h2>
  <p>Coming soon...</p>
</div>

<div id="contact" class="section">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// ===== Sidebar toggle =====
const sidebar = document.getElementById("sidebar");

document.getElementById("menuBtn").onclick = () => {
  sidebar.classList.toggle("open");
};

// ===== GSAP Page Transition System =====
let current = document.querySelector(".section.active");

function show(id){
  const next = document.getElementById(id);
  if (!next || next === current) return;

  // exit animation
  gsap.to(current, {
    opacity: 0,
    y: -30,
    scale: 0.98,
    duration: 0.4,
    ease: "power2.in",
    onComplete: () => {
      current.classList.remove("active");

      // enter animation
      next.classList.add("active");

      gsap.fromTo(next,
        { opacity: 0, y: 40, scale: 0.98 },
        { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "power3.out" }
      );

      current = next;
    }
  });

  sidebar.classList.remove("open");
}

// ===== THREE JS =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// object
const knot = new THREE.Mesh(
  new THREE.TorusKnotGeometry(1, 0.3, 120, 16),
  new THREE.MeshStandardMaterial({
    color: 0x00ffff,
    metalness: 0.5,
    roughness: 0.3
  })
);
scene.add(knot);

// light
scene.add(new THREE.PointLight(0xffffff, 1.5).position.set(5,5,5));

// stars
for (let i=0;i<250;i++){
  const star = new THREE.Mesh(
    new THREE.SphereGeometry(0.03),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );

  star.position.set(
    (Math.random()-0.5)*60,
    (Math.random()-0.5)*60,
    (Math.random()-0.5)*60
  );

  scene.add(star);
}

// smooth mouse
let tx = 0, ty = 0;

document.addEventListener("mousemove", e=>{
  tx = (e.clientX/innerWidth - 0.5) * 2;
  ty = (e.clientY/innerHeight - 0.5) * 2;
});

// animate
function animate(){
  requestAnimationFrame(animate);

  camera.position.x += (tx*2 - camera.position.x)*0.06;
  camera.position.y += (-ty*2 - camera.position.y)*0.06;

  knot.rotation.x += 0.007;
  knot.rotation.y += 0.01;

  knot.position.y = Math.sin(Date.now()*0.001)*0.25;

  renderer.render(scene, camera);
}
animate();

// resize
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
