<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brian | Ultimate Portfolio</title>

<style>
:root {
  --bg:#0f172a;
  --text:#fff;
  --accent:#00d4ff;
}

body.light {
  --bg:#fff;
  --text:#111;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  scroll-behavior:smooth;
}

/* NAV */
header {
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav a {
  margin:0 10px;
  color:white;
  text-decoration:none;
}

/* HERO */
section {
  padding:100px 20px;
  min-height:100vh;
}

.hero {
  text-align:center;
}

/* PROGRESS BAR */
#progress {
  position:fixed;
  top:0;
  height:4px;
  background:var(--accent);
  width:0%;
  z-index:999;
}

/* CURSOR */
.cursor {
  width:12px;
  height:12px;
  background:var(--accent);
  position:fixed;
  border-radius:50%;
  pointer-events:none;
}

/* BUTTON */
.btn {
  background:var(--accent);
  padding:10px 20px;
  display:inline-block;
  margin-top:10px;
}

/* SKILLS */
.bar {
  background:#333;
  height:8px;
  margin:10px 0;
}

.progress {
  height:100%;
  width:0;
  background:var(--accent);
}

/* PROJECTS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card {
  padding:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px) scale(1.05);
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
}

.modal-content {
  background:#fff;
  color:#000;
  margin:10% auto;
  padding:20px;
  width:300px;
}

/* REVEAL */
.reveal {
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}

.reveal.active {
  opacity:1;
  transform:translateY(0);
}

/* FLOAT */
.float {
  animation:float 4s infinite ease-in-out;
}

@keyframes float {
  50% { transform:translateY(-10px); }
}
</style>
</head>

<body>

<div id="progress"></div>
<div class="cursor"></div>

<header>
  <h2>Brian</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
  <button id="theme">🌙</button>
</header>

<!-- HOME -->
<section id="home" class="hero">
  <h1>Hi I'm Brian</h1>
  <h2 id="typing"></h2>
  <div class="btn">Hire Me</div>
</section>

<!-- ABOUT -->
<section id="about" class="reveal">
  <h2>About Me</h2>
  <p>I build modern animated websites.</p>

  <h3>Skills</h3>
  <div class="bar"><div class="progress" data="90%"></div></div>
  <div class="bar"><div class="progress" data="85%"></div></div>
  <div class="bar"><div class="progress" data="80%"></div></div>
</section>

<!-- PROJECTS -->
<section id="projects" class="reveal">
  <h2>Projects</h2>
  <div class="grid">
    <div class="card float" onclick="openModal('Project 1','Cool project')">Project 1</div>
    <div class="card float" onclick="openModal('Project 2','Awesome app')">Project 2</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="reveal">
  <h2>Contact</h2>
  <input placeholder="Name"><br><br>
  <input placeholder="Email"><br><br>
  <textarea placeholder="Message"></textarea><br><br>
  <button class="btn">Send</button>
</section>

<!-- MODAL -->
<div id="modal">
  <div class="modal-content">
    <span onclick="closeModal()">X</span>
    <h2 id="title"></h2>
    <p id="desc"></p>
  </div>
</div>

<script>
// DARK MODE
if(localStorage.theme==="light") document.body.classList.add("light");
document.getElementById("theme").onclick=()=>{
  document.body.classList.toggle("light");
  localStorage.theme=document.body.classList.contains("light")?"light":"dark";
};

// TYPING
const words=["Developer","Designer","Freelancer"];
let i=0,j=0;
function type(){
  document.getElementById("typing").innerText=words[i].slice(0,j++);
  if(j>words[i].length){i=(i+1)%words.length;j=0;}
  setTimeout(type,120);
}
type();

// SCROLL PROGRESS
window.onscroll=()=>{
  let s=document.documentElement.scrollTop;
  let h=document.documentElement.scrollHeight-document.documentElement.clientHeight;
  document.getElementById("progress").style.width=(s/h)*100+"%";
};

// CURSOR
document.onmousemove=e=>{
  document.querySelector(".cursor").style.cssText=`top:${e.y}px;left:${e.x}px`;
};

// REVEAL
const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{if(x.isIntersecting)x.target.classList.add("active")});
});
document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));

// SKILLS ANIMATION
const skillObs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting){
      x.target.querySelectorAll(".progress").forEach(p=>{
        p.style.width=p.getAttribute("data");
      });
    }
  });
});
skillObs.observe(document.querySelector("#about"));

// MODAL
function openModal(t,d){
  modal.style.display="block";
  title.innerText=t;
  desc.innerText=d;
}
function closeModal(){modal.style.display="none";}
</script>

</body>
</html>
