<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
    </header>
    <main>
        <section>
            <h2>Manage Projects</h2>
            <form id="project-form">
                <input type="text" placeholder="Project Name" required>
                <textarea placeholder="Project Description" required></textarea>
                <button type="submit">Add Project</button>
            </form>
            <ul id="project-list"></ul>
        </section>

        <section>
            <h2>Manage Skills</h2>
            <form id="skills-form">
                <input type="text" placeholder="Skill" required>
                <button type="submit">Add Skill</button>
            </form>
            <ul id="skills-list"></ul>
        </section>

        <section>
            <h2>About Information</h2>
            <form id="about-form">
                <textarea placeholder="About Me" required></textarea>
                <button type="submit">Update About</button>
            </form>
        </section>

        <section>
            <h2>Contact Details</h2>
            <form id="contact-form">
                <input type="text" placeholder="Email" required>
                <input type="tel" placeholder="Phone Number" required>
                <button type="submit">Update Contact</button>
            </form>
        </section>

        <section>
            <h2>Statistics</h2>
            <div>
                <p>Total Projects: <span id="total-projects">0</span></p>
                <p>Total Skills: <span id="total-skills">0</span></p>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
